apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: url-shortener-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: /dev/dev-k8s/url-shortener/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /dev/dev-k8s/url-shortener/POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: /dev/dev-k8s/url-shortener/POSTGRES_DB
    - secretKey: JWT_SECRET
      remoteRef:
        key: /dev/dev-k8s/url-shortener/JWT_SECRET
