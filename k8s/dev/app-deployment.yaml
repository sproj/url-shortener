apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    app: url-shortener
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-shortener
      component: api
  template:
    metadata:
      labels:
        app: url-shortener
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        - name: create-database
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: POSTGRES_PORT
          command:
            - sh
            - -c
            - |
              CONN="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/postgres"
              psql "$CONN" -tc "SELECT 1 FROM pg_database WHERE datname='url_shortener'" \
                | grep -q 1 \
                || psql "$CONN" -c "CREATE DATABASE url_shortener"
      containers:
        - name: url-shortener
          image: ghcr.io/sproj/url-shortener:main
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: url-shortener-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: POSTGRES_DB
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
