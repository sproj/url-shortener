apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: url-shortener
  endpoints:
    - port: http
      path: "/metrics"
      interval: 15s
  namespaceSelector:
    matchNames:
      - url-shortener
