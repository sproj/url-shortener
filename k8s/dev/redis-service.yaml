# ClusterIP service — redis is internal only, no external access needed
# App connects to: redis-service:6379
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: url-shortener
spec:
  selector:
    app: url-shortener
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
