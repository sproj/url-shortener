# ClusterIP service — used by the app to reach postgres
# App connects to: postgres-service:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: url-shortener
spec:
  selector:
    app: url-shortener
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
