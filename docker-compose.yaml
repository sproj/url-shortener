services:
  postgres:
    image: postgres:17-alpine
    restart: always
    volumes:
      - postgres:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - 5432:5432

  redis:
    image: redis:7-alpine
    volumes:
      - redis:/data
    ports:
      - 6379:6379

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - 5540:5540
    depends_on:
      - redis
  
  jaeger:
    image: jaegertracing/jaeger:2.17.0
    ports:
      - 16686:16686
      - 4317:4317
      - 4318:4318
      - 5778:5778
      - 9411:9411

volumes:
  redis:
  postgres:
